<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>极简日记</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #fafafa;
    --text: #222;
    --text-secondary: #888;
    --border: #e5e5e5;
    --accent: #2563eb;
    --accent-hover: #1d4ed8;
    --surface: #fff;
    --danger: #dc2626;
    --success: #16a34a;
    --warning: #ca8a04;
  }
  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  #app {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 720px;
    margin: 0 auto;
    background: var(--surface);
    position: relative;
  }

  .header {
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    z-index: 10;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 19px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }
  .header .subtitle {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .header .sync-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    background: #f0fdf4;
    color: var(--success);
    margin-left: 8px;
    font-weight: 500;
  }
  .header .sync-badge.offline {
    background: #fef2f2;
    color: var(--danger);
  }
  .header .sync-badge.pending {
    background: #fefce8;
    color: var(--warning);
  }

  .content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
  }
  .content::-webkit-scrollbar {
    width: 6px;
  }
  .content::-webkit-scrollbar-track {
    background: transparent;
  }
  .content::-webkit-scrollbar-thumb {
    background: #ccc;
    border-radius: 3px;
  }
  .page {
    display: none;
    padding: 20px;
    min-height: 100%;
  }
  .page.active { display: block; }

  /* Write */
  .write-meta {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .write-area {
    width: 100%;
    min-height: 55vh;
    border: none;
    outline: none;
    font-size: 17px;
    line-height: 1.8;
    resize: none;
    font-family: inherit;
    color: var(--text);
    background: transparent;
  }
  .write-area::placeholder { color: #ccc; }

  /* Save bar */
  .save-bar {
    padding: 10px 20px calc(10px + env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    z-index: 20;
    flex-shrink: 0;
  }
  .save-bar .status {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .btn {
    padding: 10px 22px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { opacity: 0.8; }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:disabled {
    background: #ccc;
    cursor: not-allowed;
  }
  .btn-secondary {
    background: var(--border);
    color: var(--text);
  }
  .btn-danger {
    background: #fee2e2;
    color: var(--danger);
  }
  .btn-small {
    padding: 6px 12px;
    font-size: 13px;
  }

  /* List */
  .diary-list {
    list-style: none;
    padding-bottom: 80px;
  }
  .diary-item {
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .diary-item:active { background: var(--bg); }
  .diary-item .date {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }
  .diary-item .weekday {
    font-size: 12px;
    color: var(--text-secondary);
    margin-left: 6px;
    font-weight: 400;
  }
  .diary-item .preview {
    font-size: 14px;
    color: var(--text-secondary);
    line-height: 1.5;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }
  .empty-state svg {
    width: 48px;
    height: 48px;
    margin-bottom: 16px;
    opacity: 0.3;
  }

  /* Detail */
  .detail-body {
    font-size: 16px;
    line-height: 1.8;
    padding-bottom: 80px;
  }
  .detail-body h1 {
    font-size: 22px;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--border);
  }
  .detail-body h2 {
    font-size: 16px;
    color: var(--accent);
    margin: 20px 0 8px;
  }
  .detail-body p { margin-bottom: 12px; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--accent);
    text-decoration: none;
    font-size: 14px;
    margin-bottom: 16px;
  }

  /* Settings */
  .form-group {
    margin-bottom: 18px;
  }
  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 6px;
    color: var(--text);
  }
  .form-group input, .form-group textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 15px;
    font-family: inherit;
    background: var(--bg);
    -webkit-appearance: none;
  }
  .form-group input:focus, .form-group textarea:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--surface);
  }
  .form-group textarea {
    min-height: 80px;
    resize: vertical;
    font-size: 13px;
    font-family: monospace;
  }
  .hint {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 4px;
    line-height: 1.4;
  }
  .hint.code {
    background: #f5f5f5;
    padding: 8px 10px;
    border-radius: 6px;
    font-family: monospace;
    font-size: 12px;
    word-break: break-all;
  }
  .settings-actions {
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .settings-actions .btn {
    width: 100%;
  }
  .settings-row {
    display: flex;
    gap: 10px;
  }
  .settings-row .btn {
    flex: 1;
  }

  /* Nav */
  .nav {
    display: flex;
    background: var(--surface);
    border-top: 1px solid var(--border);
    z-index: 30;
    flex-shrink: 0;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-item {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    border: none;
    background: none;
    -webkit-tap-highlight-color: transparent;
  }
  .nav-item.active {
    color: var(--accent);
    font-weight: 600;
  }
  .nav-item svg {
    display: block;
    margin: 0 auto 2px;
    width: 22px;
    height: 22px;
  }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-100px);
    background: #333;
    color: #fff;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 100;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }
  .spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 0.8s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .page-detail ~ .save-bar { display: none; }
</style>
</head>
<body>
<div id="app">
  <div class="header" id="header">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div>
        <h1 id="pageTitle">极简日记</h1>
        <div class="subtitle" id="pageSubtitle"></div>
      </div>
      <span class="sync-badge" id="syncBadge" style="display:none;"></span>
    </div>
  </div>

  <div class="content" id="content">
    <!-- Write -->
    <div class="page active" id="page-write">
      <div class="write-meta">
        <span id="writeDate"></span>
        <span id="writeModeHint" style="font-size:11px;color:#bbb;">自动保存到 GitHub</span>
      </div>
      <textarea class="write-area" id="writeArea" placeholder="今天发生了什么..."></textarea>
    </div>

    <!-- List -->
    <div class="page" id="page-list">
      <div id="listStatus" style="font-size:12px;color:#888;margin-bottom:10px;"></div>
      <ul class="diary-list" id="diaryList"></ul>
      <div class="empty-state" id="listEmpty" style="display:none;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <p>还没有日记</p>
        <p style="font-size:13px;margin-top:4px;">写下你的第一篇日记吧</p>
      </div>
    </div>

    <!-- Detail -->
    <div class="page" id="page-detail">
      <a href="#" class="back-link" id="backLink">← 返回列表</a>
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
        <button class="btn btn-secondary btn-small" id="btnEdit">✏️ 编辑此篇</button>
        <button class="btn btn-danger btn-small" id="btnDelete">🗑 删除此篇</button>
      </div>
      <div class="detail-body" id="detailBody"></div>
    </div>

    <!-- Settings -->
    <div class="page" id="page-settings">
      <div class="form-group">
        <label>GitHub Token</label>
        <input type="password" id="settingToken" placeholder="ghp_xxxx 或 github_pat_xxxx" autocomplete="off">
        <div class="hint">Fine-grained PAT 需勾选 Contents 读写权限，并授权本仓库。</div>
      </div>
      <div class="form-group">
        <label>用户名</label>
        <input type="text" id="settingOwner" placeholder="doudians" autocomplete="off">
      </div>
      <div class="form-group">
        <label>仓库名</label>
        <input type="text" id="settingRepo" placeholder="diary" autocomplete="off">
        <div class="hint"> diary 目录下的 Markdown 文件即为日记数据。</div>
      </div>

      <div class="settings-row">
        <button class="btn btn-secondary btn-small" id="btnTest">测试连接</button>
        <button class="btn btn-secondary btn-small" id="btnExport">导出配置</button>
        <button class="btn btn-secondary btn-small" id="btnImport">导入配置</button>
        <button class="btn btn-secondary btn-small" id="btnBookmark">生成书签</button>
      </div>

      <div class="form-group" id="importBox" style="display:none;margin-top:12px;">
        <label>粘贴配置字符串</label>
        <textarea id="importText" placeholder="粘贴之前导出的配置字符串"></textarea>
        <button class="btn btn-primary btn-small" id="btnDoImport" style="margin-top:6px;">确认导入</button>
      </div>

      <div class="form-group" id="exportBox" style="display:none;margin-top:12px;">
        <label>配置字符串（复制保存到备忘录）</label>
        <div class="hint code" id="exportText"></div>
      </div>

      <div class="form-group" id="bookmarkBox" style="display:none;margin-top:12px;">
        <label>专属书签链接（收藏此链接即可跨设备免登录）</label>
        <div class="hint code" id="bookmarkText" style="word-break:break-all;"></div>
        <div class="hint" style="margin-top:6px;">把上方链接收藏到浏览器书签或微信收藏，换设备时直接打开即可自动登录。链接中的 Token 仅保存在本地浏览器。</div>
      </div>

      <div class="settings-actions">
        <button class="btn btn-primary" id="btnSaveSettings">保存设置</button>
        <button class="btn btn-danger" id="btnClearData">清除本地数据</button>
      </div>
    </div>
  </div>

  <div class="save-bar" id="saveBar">
    <span class="status" id="saveStatus">准备就绪</span>
    <button class="btn btn-primary" id="btnSave">
      <span id="saveSpinner" style="display:none;"><span class="spinner"></span></span>
      <span id="saveText">保存到云端</span>
    </button>
  </div>

  <div class="nav" id="nav">
    <button class="nav-item active" data-page="write">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      写日记
    </button>
    <button class="nav-item" data-page="list">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      日记
    </button>
    <button class="nav-item" data-page="settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.68 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.32 9a1.65 1.65 0 001.82.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.32 15a1.65 1.65 0 00-.33 1.82V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09z"/></svg>
      设置
    </button>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
(function() {
  'use strict';

  const LS_KEY = 'minidiary_config_v2';
  const DIARY_DIR = 'diary';
  const DEFAULT_OWNER = 'doudians';
  const DEFAULT_REPO = 'diary';

  const $ = id => document.getElementById(id);
  const w = ['周日','周一','周二','周三','周四','周五','周六'];
  const fmtDate = d => `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${w[d.getDay()]}`;
  const fmtDateShort = d => `${d.getMonth()+1}月${d.getDate()}日`;
  const fmtFileDate = d => {
    const y = d.getFullYear();
    const m = String(d.getMonth()+1).padStart(2,'0');
    const day = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${day}`;
  };
  const fmtTime = d => {
    const h = String(d.getHours()).padStart(2,'0');
    const m = String(d.getMinutes()).padStart(2,'0');
    return `${h}:${m}`;
  };

  let config = null;
  let currentDate = new Date();
  let isOnline = navigator.onLine;
  let diaryCache = []; // in-memory cache for instant list updates
  let editMode = null; // { fileName, sha } or null
  let currentDetailFile = null;
  let currentDetailSha = null;

  function applyHashConfig() {
    const hash = location.hash;
    if (!hash || !hash.startsWith('#cfg=')) return false;
    try {
      const payload = hash.slice(5);
      const cfg = JSON.parse(base64ToUtf8(payload));
      if (!cfg.token) return false;
      config = {
        token: cfg.token,
        owner: cfg.owner || DEFAULT_OWNER,
        repo: cfg.repo || DEFAULT_REPO
      };
      localStorage.setItem(LS_KEY, JSON.stringify(config));
      history.replaceState(null, '', location.pathname + location.search);
      return true;
    } catch(e) {
      console.error('hash config error', e);
      return false;
    }
  }

  function loadConfig() {
    try {
      config = JSON.parse(localStorage.getItem(LS_KEY));
    } catch(e) { config = null; }
    if (config) {
      $('settingToken').value = config.token || '';
      $('settingOwner').value = config.owner || DEFAULT_OWNER;
      $('settingRepo').value = config.repo || DEFAULT_REPO;
    } else {
      $('settingOwner').value = DEFAULT_OWNER;
      $('settingRepo').value = DEFAULT_REPO;
    }
    return !!(config && config.token);
  }

  function saveConfig() {
    config = {
      token: $('settingToken').value.trim(),
      owner: $('settingOwner').value.trim() || DEFAULT_OWNER,
      repo: $('settingRepo').value.trim() || DEFAULT_REPO
    };
    localStorage.setItem(LS_KEY, JSON.stringify(config));
  }

  function clearConfig() {
    localStorage.removeItem(LS_KEY);
    config = null;
    $('settingToken').value = '';
    $('settingOwner').value = DEFAULT_OWNER;
    $('settingRepo').value = DEFAULT_REPO;
    showToast('本地数据已清除');
  }

  function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function setSyncBadge(status, text) {
    const b = $('syncBadge');
    b.style.display = 'inline-flex';
    b.textContent = text;
    b.className = 'sync-badge' + (status ? ' ' + status : '');
  }
  function hideSyncBadge() {
    $('syncBadge').style.display = 'none';
  }

  function setSaveState(saving) {
    $('btnSave').disabled = saving || !isOnline;
    $('saveSpinner').style.display = saving ? 'inline' : 'none';
    $('saveText').textContent = saving ? '保存中' : '保存到云端';
  }

  function updateOnlineStatus() {
    isOnline = navigator.onLine;
    const st = $('saveStatus');
    if (!isOnline) {
      st.textContent = '离线模式 — 请连接网络';
      st.style.color = 'var(--danger)';
      $('btnSave').disabled = true;
      setSyncBadge('offline', '离线');
    } else {
      st.textContent = '准备就绪';
      st.style.color = '';
      $('btnSave').disabled = false;
      hideSyncBadge();
    }
  }

  function getApiBase() {
    return `https://api.github.com/repos/${config.owner}/${config.repo}`;
  }
  function getHeaders() {
    return {
      'Authorization': `Bearer ${config.token}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      'Content-Type': 'application/json'
    };
  }

  async function apiGet(path) {
    const res = await fetch(getApiBase() + path, { headers: getHeaders() });
    if (res.status === 404) return null;
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`HTTP ${res.status}: ${txt}`);
    }
    return res.json();
  }

  async function apiPut(path, body) {
    const res = await fetch(getApiBase() + path, {
      method: 'PUT',
      headers: getHeaders(),
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`HTTP ${res.status}: ${txt}`);
    }
    return res.json();
  }

  // Modern UTF-8 safe base64
  function utf8ToBase64(str) {
    const bytes = new TextEncoder().encode(str);
    const bin = Array.from(bytes, b => String.fromCharCode(b)).join('');
    return btoa(bin);
  }
  function base64ToUtf8(str) {
    const clean = str.replace(/\s/g, '');
    const bin = atob(clean);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }

  async function ensureDiaryDir() {
    // GitHub creates directories implicitly via file paths, but let's verify repo exists
    const repo = await apiGet('');
    if (!repo || !repo.id) throw new Error('仓库不存在或 Token 无权访问');
  }

  async function saveDiary() {
    const text = $('writeArea').value.trim();
    if (!text) { showToast('内容不能为空'); return; }
    if (!config || !config.token) { showToast('请先完成设置'); switchPage('settings'); return; }

    setSaveState(true);
    setSyncBadge('pending', '同步中...');

    try {
      await ensureDiaryDir();

      if (editMode) {
        // Edit mode: overwrite entire file
        const fileName = editMode.fileName;
        const path = `/${DIARY_DIR}/${fileName}`;
        await apiPut(`/contents${path}`, {
          message: `diary: edit ${fileName}`,
          content: utf8ToBase64(text),
          sha: editMode.sha
        });
        // Update cache
        const idx = diaryCache.findIndex(d => d.name === fileName);
        if (idx >= 0) {
          diaryCache[idx].preview = text.slice(0, 60).replace(/\n/g, ' ') + (text.length > 60 ? '...' : '');
        }
        $('writeArea').value = '';
        editMode = null;
        updateWriteModeUI();
        showToast('修改已保存');
        setSyncBadge('', '已同步');
        setTimeout(hideSyncBadge, 3000);
      } else {
        // New mode: append to today's file
        const fileName = `${fmtFileDate(currentDate)}.md`;
        const path = `/${DIARY_DIR}/${fileName}`;
        const timeStr = fmtTime(new Date());
        const newEntry = `## ${timeStr}\n${text}\n\n`;
        let content = `# ${fmtFileDate(currentDate)}\n\n${newEntry}`;
        let sha = null;
        const existing = await apiGet(`/contents${path}`);
        if (existing && existing.content) {
          sha = existing.sha;
          const existingText = base64ToUtf8(existing.content);
          content = existingText.trimEnd() + '\n\n' + newEntry;
        }

        await apiPut(`/contents${path}`, {
          message: `diary: ${fileName}`,
          content: utf8ToBase64(content),
          ...(sha ? { sha } : {})
        });

        // Update cache so list shows instantly without re-fetching
        const cacheEntry = {
          name: fileName,
          dateLabel: fmtDateShort(currentDate),
          weekday: w[currentDate.getDay()],
          preview: text.slice(0, 60).replace(/\n/g, ' ') + (text.length > 60 ? '...' : '')
        };
        const existingIndex = diaryCache.findIndex(d => d.name === fileName);
        if (existingIndex >= 0) {
          diaryCache[existingIndex] = cacheEntry;
        } else {
          diaryCache.unshift(cacheEntry);
        }

        $('writeArea').value = '';
        showToast('已保存到 GitHub');
        setSyncBadge('', '已同步');
        setTimeout(hideSyncBadge, 3000);
      }
    } catch (err) {
      console.error(err);
      let msg = err.message || '未知错误';
      if (msg.includes('401')) msg = 'Token 无效或已过期';
      else if (msg.includes('403')) msg = 'Token 无权限（请检查是否授权本仓库 Contents 读写）';
      else if (msg.includes('404')) msg = '仓库不存在';
      else if (msg.includes('422')) msg = '请求格式错误';
      showToast('保存失败: ' + msg);
      setSyncBadge('offline', '同步失败');
    } finally {
      setSaveState(false);
    }
  }

  async function loadDiaryList() {
    if (!config || !config.token) { showToast('请先完成设置'); switchPage('settings'); return; }

    // Render cache instantly if available
    if (diaryCache.length > 0) {
      renderDiaryList(diaryCache, '已缓存，后台同步中...');
    } else {
      $('diaryList').innerHTML = '';
      $('listEmpty').style.display = 'none';
      $('listStatus').textContent = '正在从 GitHub 加载...';
    }

    try {
      const files = await apiGet(`/contents/${DIARY_DIR}`);
      if (!files || !Array.isArray(files) || files.length === 0) {
        diaryCache = [];
        $('diaryList').innerHTML = '';
        $('listEmpty').style.display = 'block';
        $('listStatus').textContent = '';
        return;
      }

      const mdFiles = files
        .filter(f => f.name.endsWith('.md'))
        .sort((a, b) => b.name.localeCompare(a.name));

      if (mdFiles.length === 0) {
        diaryCache = [];
        $('listEmpty').style.display = 'block';
        $('listStatus').textContent = '';
        return;
      }

      // Build fresh cache from API
      diaryCache = [];
      for (const f of mdFiles) {
        const dateMatch = f.name.match(/(\d{4})-(\d{2})-(\d{2})/);
        let dateLabel = f.name.replace('.md','');
        let wday = '';
        if (dateMatch) {
          const d = new Date(+dateMatch[1], +dateMatch[2]-1, +dateMatch[3]);
          dateLabel = fmtDateShort(d);
          wday = w[d.getDay()];
        }

        let preview = '...';
        try {
          const detail = await apiGet(`/contents/${DIARY_DIR}/${f.name}`);
          if (detail && detail.content) {
            const full = base64ToUtf8(detail.content);
            preview = full.replace(/^#\s+\d{4}-\d{2}-\d{2}\s*/, '').replace(/##\s+\d{2}:\d{2}\s*/g, ' ').trim();
            preview = preview.slice(0, 60).replace(/\n/g, ' ') + (preview.length > 60 ? '...' : '');
          }
        } catch(e) {}

        diaryCache.push({ name: f.name, dateLabel, weekday: wday, preview });
      }

      renderDiaryList(diaryCache, `共 ${mdFiles.length} 篇日记（来自 GitHub）`);
    } catch (err) {
      console.error(err);
      if (diaryCache.length === 0) {
        $('diaryList').innerHTML = '';
        $('listEmpty').style.display = 'block';
      }
      $('listStatus').textContent = '加载失败';
      let msg = err.message || '';
      if (msg.includes('404')) msg = '目录不存在，请先写一篇日记';
      showToast('加载失败: ' + msg);
    }
  }

  function renderDiaryList(items, statusText) {
    $('diaryList').innerHTML = '';
    $('listEmpty').style.display = 'none';
    $('listStatus').textContent = statusText;
    for (const item of items) {
      const li = document.createElement('li');
      li.className = 'diary-item';
      li.innerHTML = `<div class="date">${item.dateLabel}<span class="weekday">${item.weekday}</span></div><div class="preview">${item.preview}</div>`;
      li.addEventListener('click', () => showDetail(item.name));
      $('diaryList').appendChild(li);
    }
  }

  async function showDetail(fileName) {
    if (!config) return;
    try {
      const detail = await apiGet(`/contents/${DIARY_DIR}/${fileName}`);
      if (!detail || !detail.content) { showToast('读取失败'); return; }
      const md = base64ToUtf8(detail.content);
      $('detailBody').innerHTML = marked.parse(md);
      currentDetailFile = fileName;
      currentDetailSha = detail.sha;
      switchPage('detail');
    } catch (err) {
      showToast('读取失败: ' + err.message);
    }
  }

  function switchPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

    const map = {
      write: { page: 'page-write', nav: 'write', title: fmtDate(currentDate), subtitle: '记录当下的想法' },
      list: { page: 'page-list', nav: 'list', title: '日记列表', subtitle: '' },
      detail: { page: 'page-detail', nav: 'list', title: '日记详情', subtitle: '' },
      settings: { page: 'page-settings', nav: 'settings', title: '设置', subtitle: 'GitHub 连接配置' }
    };
    const m = map[page];
    if (!m) return;

    $(m.page).classList.add('active');
    document.querySelector(`.nav-item[data-page="${m.nav}"]`).classList.add('active');
    $('pageTitle').textContent = m.title;
    $('pageSubtitle').textContent = m.subtitle;

    if (page === 'write') {
      $('saveBar').style.display = 'flex';
      $('nav').style.display = 'flex';
      $('writeDate').textContent = fmtDate(currentDate);
      updateWriteModeUI();
      if (!editMode) {
        $('writeArea').value = '';
      }
      setTimeout(() => $('writeArea').focus(), 100);
    } else if (page === 'detail') {
      $('saveBar').style.display = 'none';
      $('nav').style.display = 'none';
    } else {
      $('saveBar').style.display = 'none';
      $('nav').style.display = 'flex';
    }

    if (page === 'list') loadDiaryList();
  }

  async function testConnection() {
    const token = $('settingToken').value.trim();
    const owner = $('settingOwner').value.trim() || DEFAULT_OWNER;
    const repo = $('settingRepo').value.trim() || DEFAULT_REPO;
    if (!token) { showToast('请填写 Token'); return; }

    const tmp = config;
    config = { token, owner, repo };
    try {
      await ensureDiaryDir();
      // Try to write a test file then delete it
      const testPath = '/diary/.diary-test';
      const testContent = 'test';
      const putRes = await apiPut(`/contents${testPath}`, {
        message: 'diary: test connection',
        content: utf8ToBase64(testContent)
      });
      if (putRes && putRes.content && putRes.content.sha) {
        await fetch(getApiBase() + `/contents${testPath}`, {
          method: 'DELETE',
          headers: getHeaders(),
          body: JSON.stringify({ message: 'diary: cleanup test', sha: putRes.content.sha })
        });
      }
      showToast('连接成功 — 读写权限正常');
    } catch (err) {
      let msg = err.message || '';
      if (msg.includes('401')) msg = 'Token 无效';
      else if (msg.includes('403')) msg = 'Token 无权限，请检查是否授权本仓库 Contents 读写';
      else if (msg.includes('404')) msg = '仓库不存在';
      showToast('连接失败: ' + msg);
    }
    config = tmp;
  }

  function exportConfig() {
    const token = $('settingToken').value.trim();
    const owner = $('settingOwner').value.trim() || DEFAULT_OWNER;
    const repo = $('settingRepo').value.trim() || DEFAULT_REPO;
    if (!token) { showToast('请先填写 Token'); return; }
    const payload = utf8ToBase64(JSON.stringify({ token, owner, repo, v: 2 }));
    $('exportText').textContent = payload;
    $('exportBox').style.display = 'block';
    $('importBox').style.display = 'none';
    showToast('请复制上方字符串保存到备忘录');
  }

  function importConfig() {
    $('importBox').style.display = 'block';
    $('exportBox').style.display = 'none';
  }

  function doImport() {
    const text = $('importText').value.trim();
    if (!text) { showToast('请输入配置字符串'); return; }
    try {
      const cfg = JSON.parse(base64ToUtf8(text));
      if (!cfg.token) throw new Error('无效配置');
      $('settingToken').value = cfg.token;
      $('settingOwner').value = cfg.owner || DEFAULT_OWNER;
      $('settingRepo').value = cfg.repo || DEFAULT_REPO;
      saveConfig();
      showToast('配置已导入并保存');
      $('importBox').style.display = 'none';
    } catch(e) {
      showToast('导入失败: 字符串无效');
    }
  }

  function generateBookmarkLink() {
    const token = $('settingToken').value.trim();
    const owner = $('settingOwner').value.trim() || DEFAULT_OWNER;
    const repo = $('settingRepo').value.trim() || DEFAULT_REPO;
    if (!token) { showToast('请先填写 Token'); return; }
    const payload = utf8ToBase64(JSON.stringify({ token, owner, repo, v: 2 }));
    const url = location.origin + location.pathname + '#cfg=' + payload;
    $('bookmarkText').textContent = url;
    $('bookmarkBox').style.display = 'block';
    showToast('链接已生成，请收藏到书签');
  }

  function updateWriteModeUI() {
    if (editMode) {
      $('pageTitle').textContent = '编辑日记';
      $('writeModeHint').textContent = '编辑模式 — 保存将覆盖原文件';
      $('saveText').textContent = '保存修改';
    } else {
      $('pageTitle').textContent = fmtDate(currentDate);
      $('writeModeHint').textContent = '自动保存到 GitHub';
      $('saveText').textContent = '保存到云端';
    }
  }

  async function startEdit() {
    if (!currentDetailFile) return;
    try {
      const detail = await apiGet(`/contents/${DIARY_DIR}/${currentDetailFile}`);
      if (!detail || !detail.content) { showToast('读取失败'); return; }
      const md = base64ToUtf8(detail.content);
      editMode = { fileName: currentDetailFile, sha: detail.sha };
      $('writeArea').value = md;
      updateWriteModeUI();
      switchPage('write');
      showToast('已进入编辑模式');
    } catch (err) {
      showToast('读取失败: ' + err.message);
    }
  }

  async function deleteDiary() {
    if (!currentDetailFile || !currentDetailSha) return;
    if (!confirm('确定要删除这篇日记吗？此操作不可恢复。')) return;
    try {
      const res = await fetch(getApiBase() + `/contents/${DIARY_DIR}/${currentDetailFile}`, {
        method: 'DELETE',
        headers: getHeaders(),
        body: JSON.stringify({
          message: `diary: delete ${currentDetailFile}`,
          sha: currentDetailSha
        })
      });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error(`HTTP ${res.status}: ${txt}`);
      }
      diaryCache = diaryCache.filter(d => d.name !== currentDetailFile);
      currentDetailFile = null;
      currentDetailSha = null;
      showToast('已删除');
      switchPage('list');
    } catch (err) {
      showToast('删除失败: ' + err.message);
    }
  }

  // Events
  $('btnSave').addEventListener('click', saveDiary);
  $('btnSaveSettings').addEventListener('click', () => {
    saveConfig();
    showToast('设置已保存');
    switchPage('write');
  });
  $('btnTest').addEventListener('click', testConnection);
  $('btnExport').addEventListener('click', exportConfig);
  $('btnImport').addEventListener('click', importConfig);
  $('btnDoImport').addEventListener('click', doImport);
  $('btnBookmark').addEventListener('click', generateBookmarkLink);
  $('btnEdit').addEventListener('click', startEdit);
  $('btnDelete').addEventListener('click', deleteDiary);
  $('btnClearData').addEventListener('click', () => {
    if (confirm('确定要清除所有本地保存的 Token 和设置吗？')) {
      clearConfig();
    }
  });
  $('backLink').addEventListener('click', e => {
    e.preventDefault();
    switchPage('list');
  });
  document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => switchPage(btn.dataset.page));
  });
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      if ($('page-write').classList.contains('active')) {
        saveDiary();
      }
    }
  });
  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);

  // Init
  updateOnlineStatus();
  const hashLoaded = applyHashConfig();
  const hasConfig = loadConfig();
  if (hashLoaded) {
    showToast('已通过书签链接自动登录');
    switchPage('write');
  } else if (hasConfig) {
    switchPage('write');
  } else {
    switchPage('settings');
  }
})();
</script>
</body>
